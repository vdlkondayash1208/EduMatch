name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'outputs/edumatch/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: outputs/edumatch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: outputs/edumatch/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE: https://edumatch-zufb.onrender.com

      - name: Copy 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: outputs/edumatch/dist
          publish_branch: gh-pages
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: 'Deploy frontend to GitHub Pages [skip ci]'
